version: v2
name: testserver
services:
- name: web
  run: "python server.py"
  type: web
  instances: 1
  cpuCores: 0.1 
  ramMegabytes: 100
  terminationGracePeriodSeconds: 30
  port: 8088
  advancedNetworking:
    timeouts:
      connectSeconds: 20
      readSeconds: 20
      writeSeconds: 20
      clientBodyTimeoutSeconds: 30
    requestBody:
      maxSizeBytes: 1048576
    rateLimit:
      requestsPerMinute: 20
      burstSize: 4
    buffering:
      inbound:
        enabled: true
        sizeBytes: 65536
      outbound:
        enabled: true
        sizeBytes: 65536
    sessionAffinity:
      enabled: true
      mode: COOKIE
      ttlSeconds: 600
    firewall:
      allowedCidrs:
        - "73.162.196.20/32"
      blockedPaths:
        - "/admin"
        - "/internal"
    headers:
      request:
        add:
          X-Porter-Test: "advanced-networking"
        remove:
          - "X-Unwanted-Header"
      response:
        add:
          X-Frame-Options: "DENY"
          X-Content-Type-Options: "nosniff"
    compression:
      enabled: true
      level: 6
      minLength: 256
      types:
        - "application/json"
        - "text/plain"
        - "text/css"
        - "application/javascript"
    redirects:
      hostRedirects:
        - from: "old.example.com"
          to: "new.example.com"
          permanent: true
build:
  context: ./
  method: docker
  dockerfile: Dockerfile
deploymentStrategy: {}
