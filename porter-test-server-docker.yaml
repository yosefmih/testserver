version: v2
name: testserver2
services:
- name: web
  run: "python server.py"
  type: web
  instances: 2
  cpuCores: 0.1
  ramMegabytes: 100
  terminationGracePeriodSeconds: 30
  port: 8088
  domains:
  - name: web-1-cdded00c-76e4daot.withporter.run
  sleep: false
  serviceMeshEnabled: false
  advancedNetworking:
    timeouts:
      connectSeconds: 20
      readSeconds: 20
      writeSeconds: 20
    requestBody:
      maxSizeBytes: 1048576
    rateLimit:
      requestsPerMinute: 10
      burstSize: 2
    buffering:
      inbound:
        enabled: true
        sizeBytes: 65536
      outbound:
        enabled: true
        sizeBytes: 65536
    sessionAffinity:
      enabled: true
      mode: COOKIE
      ttlSeconds: 600
    firewall:
      allowedCidrs:
        - "216.158.129.250/32"
build:
  context: ./
  method: docker
  dockerfile: Dockerfile
deploymentStrategy: {}
