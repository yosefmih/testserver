version: v2
name: jupyter-sandbox
services:
- name: web
  run: "uvicorn backend.main:app --host 0.0.0.0 --port 8000"
  type: web
  instances: 1
  cpuCores: 0.2
  ramMegabytes: 256
  terminationGracePeriodSeconds: 30
  port: 8000
  domains:
  - name: jupyter-sandbox.withporter.run
  sleep: false
  serviceMeshEnabled: false
env:
  SANDBOX_API_URL: "http://sandbox-central.kube-system.svc.cluster.local"
  JUPYTER_IMAGE: "jupyter/scipy-notebook"
  TTL_SECONDS: "3600"
  IAM_ROLE_ARN: ""
  LOG_LEVEL: "DEBUG"
build:
  context: ./
  method: docker
  dockerfile: Dockerfile
deploymentStrategy: {}

