<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amharic Web Scraper</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            padding: 30px;
            margin-bottom: 30px;
        }

        .card-title {
            font-size: 1.5em;
            margin-bottom: 20px;
            color: #333;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e1e8ed;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
            font-family: inherit;
        }

        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: #f1f3f5;
            color: #495057;
        }

        .btn-secondary:hover {
            background: #e9ecef;
        }

        .jobs-list {
            display: grid;
            gap: 15px;
        }

        .job-item {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s;
            border-left: 4px solid transparent;
        }

        .job-item:hover {
            background: #e9ecef;
            transform: translateX(5px);
        }

        .job-item.status-running {
            border-left-color: #28a745;
        }

        .job-item.status-completed {
            border-left-color: #007bff;
        }

        .job-item.status-failed {
            border-left-color: #dc3545;
        }

        .job-item.status-queued {
            border-left-color: #ffc107;
        }

        .job-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .job-id {
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
            color: #666;
        }

        .job-status {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
            text-transform: uppercase;
        }

        .status-running {
            background: #d4edda;
            color: #155724;
        }

        .status-completed {
            background: #cce5ff;
            color: #004085;
        }

        .status-failed {
            background: #f8d7da;
            color: #721c24;
        }

        .status-queued {
            background: #fff3cd;
            color: #856404;
        }

        .job-stats {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            margin-top: 10px;
        }

        .stat {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.9em;
            color: #666;
        }

        .stat-value {
            font-weight: 600;
            color: #333;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e9ecef;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 10px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            transition: width 0.3s;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 12px;
            padding: 30px;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 1.5em;
            cursor: pointer;
            color: #999;
        }

        .modal-close:hover {
            color: #333;
        }

        .alert {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .alert-info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .empty-state-icon {
            font-size: 3em;
            margin-bottom: 10px;
        }

        .url-list {
            margin-top: 10px;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 4px;
            font-size: 0.9em;
        }

        .url-item {
            padding: 5px 0;
            color: #495057;
            word-break: break-all;
        }

        .config-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        .config-item {
            background: #f8f9fa;
            padding: 10px;
            border-radius: 6px;
        }

        .config-label {
            font-size: 0.8em;
            color: #666;
            margin-bottom: 5px;
        }

        .config-value {
            font-weight: 600;
            color: #333;
        }

        .refresh-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            font-size: 1.5em;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
            transition: transform 0.3s;
        }

        .refresh-btn:hover {
            transform: scale(1.1);
        }

        .refresh-btn.spinning {
            animation: spin 1s linear infinite;
        }

        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }
            
            .job-stats {
                flex-direction: column;
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔍 Amharic Web Scraper</h1>
            <p>Extract Amharic text from websites and store in S3</p>
        </div>

        <!-- Create Job Form -->
        <div class="card">
            <div class="card-title">
                <span>📝 Create New Scraping Job</span>
            </div>
            <div id="alert-container"></div>
            <form id="create-job-form">
                <div class="form-group">
                    <label for="seed-urls">Seed URLs (one per line)</label>
                    <textarea 
                        id="seed-urls" 
                        placeholder="https://example.com&#10;https://another-site.com"
                        required
                    ></textarea>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="max-depth">Max Depth</label>
                        <input type="number" id="max-depth" value="3" min="1" max="10">
                    </div>
                    <div class="form-group">
                        <label for="max-pages">Max Pages</label>
                        <input type="number" id="max-pages" value="100" min="1" max="10000">
                    </div>
                    <div class="form-group">
                        <label for="rate-limit">Rate Limit (seconds)</label>
                        <input type="number" id="rate-limit" value="2.0" min="0.5" max="10" step="0.5">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="timeout">Timeout (seconds)</label>
                        <input type="number" id="timeout" value="10" min="5" max="60">
                    </div>
                    <div class="form-group">
                        <label for="same-domain">Same Domain Only</label>
                        <select id="same-domain">
                            <option value="true">Yes</option>
                            <option value="false">No</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="amharic-threshold">Amharic Threshold</label>
                        <input type="number" id="amharic-threshold" value="0.3" min="0" max="1" step="0.1">
                    </div>
                </div>

                <button type="submit" class="btn btn-primary" id="submit-btn">
                    Start Scraping
                </button>
            </form>
        </div>

        <!-- Jobs List -->
        <div class="card">
            <div class="card-title">
                <span>📊 Scraping Jobs</span>
                <button class="btn btn-secondary" onclick="loadJobs()">
                    Refresh
                </button>
            </div>
            <div id="jobs-container">
                <div class="empty-state">
                    <div class="empty-state-icon">📭</div>
                    <p>No jobs yet. Create one to get started!</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Job Details Modal -->
    <div id="job-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Job Details</h2>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div id="modal-body"></div>
        </div>
    </div>

    <!-- Refresh Button -->
    <button class="refresh-btn" onclick="loadJobs()" title="Refresh jobs">
        🔄
    </button>

    <script>
        const API_BASE = window.location.origin;

        // Show alert message
        function showAlert(message, type = 'info') {
            const container = document.getElementById('alert-container');
            const alert = document.createElement('div');
            alert.className = `alert alert-${type}`;
            alert.textContent = message;
            container.innerHTML = '';
            container.appendChild(alert);
            setTimeout(() => alert.remove(), 5000);
        }

        // Create new job
        document.getElementById('create-job-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const seedUrls = document.getElementById('seed-urls').value
                .split('\n')
                .map(url => url.trim())
                .filter(url => url);

            if (seedUrls.length === 0) {
                showAlert('Please enter at least one URL', 'error');
                return;
            }

            const data = {
                seed_urls: seedUrls,
                config: {
                    max_depth: parseInt(document.getElementById('max-depth').value),
                    max_pages: parseInt(document.getElementById('max-pages').value),
                    rate_limit: parseFloat(document.getElementById('rate-limit').value),
                    timeout: parseInt(document.getElementById('timeout').value),
                    same_domain_only: document.getElementById('same-domain').value === 'true',
                    amharic_threshold: parseFloat(document.getElementById('amharic-threshold').value)
                }
            };

            const submitBtn = document.getElementById('submit-btn');
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="loading"></span> Creating...';

            try {
                const response = await fetch(`${API_BASE}/api/scrape`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if (response.ok) {
                    const result = await response.json();
                    showAlert(`Job created successfully! ID: ${result.job_id}`, 'success');
                    document.getElementById('create-job-form').reset();
                    setTimeout(() => loadJobs(), 1000);
                } else {
                    const error = await response.json();
                    showAlert(`Error: ${error.detail || 'Failed to create job'}`, 'error');
                }
            } catch (error) {
                showAlert(`Error: ${error.message}`, 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Start Scraping';
            }
        });

        // Load jobs list
        async function loadJobs() {
            const container = document.getElementById('jobs-container');
            const refreshBtn = document.querySelector('.refresh-btn');
            refreshBtn.classList.add('spinning');

            try {
                const response = await fetch(`${API_BASE}/api/jobs?limit=50`);
                const data = await response.json();

                if (data.jobs.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state-icon">📭</div>
                            <p>No jobs yet. Create one to get started!</p>
                        </div>
                    `;
                    return;
                }

                container.innerHTML = `<div class="jobs-list">${data.jobs.map(job => renderJob(job)).join('')}</div>`;
            } catch (error) {
                container.innerHTML = `
                    <div class="alert alert-error">
                        Failed to load jobs: ${error.message}
                    </div>
                `;
            } finally {
                refreshBtn.classList.remove('spinning');
            }
        }

        // Render single job
        function renderJob(job) {
            const progress = job.progress || {};
            const stats = job.stats || {};
            const percentage = job.config?.max_pages 
                ? Math.round((progress.pages_scraped || 0) / job.config.max_pages * 100)
                : 0;

            return `
                <div class="job-item status-${job.status}" onclick="showJobDetails('${job.id}')">
                    <div class="job-header">
                        <span class="job-id">Job: ${job.id.substring(0, 8)}...</span>
                        <span class="job-status status-${job.status}">${job.status}</span>
                    </div>
                    <div class="job-stats">
                        <div class="stat">
                            <span>📄 Pages:</span>
                            <span class="stat-value">${progress.pages_scraped || 0}</span>
                        </div>
                        <div class="stat">
                            <span>📝 Amharic:</span>
                            <span class="stat-value">${progress.pages_amharic || 0}</span>
                        </div>
                        <div class="stat">
                            <span>⏱️ Queue:</span>
                            <span class="stat-value">${progress.queue_size || 0}</span>
                        </div>
                        <div class="stat">
                            <span>⏰ Time:</span>
                            <span class="stat-value">${Math.round(stats.elapsed_seconds || 0)}s</span>
                        </div>
                    </div>
                    ${job.status === 'running' ? `
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${percentage}%"></div>
                        </div>
                    ` : ''}
                </div>
            `;
        }

        // Show job details modal
        async function showJobDetails(jobId) {
            const modal = document.getElementById('job-modal');
            const modalBody = document.getElementById('modal-body');
            
            modal.classList.add('active');
            modalBody.innerHTML = '<p>Loading...</p>';

            try {
                const response = await fetch(`${API_BASE}/api/jobs/${jobId}`);
                const job = await response.json();
                
                modalBody.innerHTML = `
                    <div>
                        <div class="job-header" style="margin-bottom: 20px;">
                            <span class="job-id">${job.id}</span>
                            <span class="job-status status-${job.status}">${job.status}</span>
                        </div>

                        <h3>Seed URLs</h3>
                        <div class="url-list">
                            ${job.seed_urls.map(url => `<div class="url-item">🔗 ${url}</div>`).join('')}
                        </div>

                        <h3 style="margin-top: 20px;">Configuration</h3>
                        <div class="config-grid">
                            <div class="config-item">
                                <div class="config-label">Max Depth</div>
                                <div class="config-value">${job.config?.max_depth || 3}</div>
                            </div>
                            <div class="config-item">
                                <div class="config-label">Max Pages</div>
                                <div class="config-value">${job.config?.max_pages || 1000}</div>
                            </div>
                            <div class="config-item">
                                <div class="config-label">Rate Limit</div>
                                <div class="config-value">${job.config?.rate_limit || 2.0}s</div>
                            </div>
                            <div class="config-item">
                                <div class="config-label">Amharic Threshold</div>
                                <div class="config-value">${(job.config?.amharic_threshold || 0.3) * 100}%</div>
                            </div>
                        </div>

                        <h3 style="margin-top: 20px;">Progress</h3>
                        <div class="config-grid">
                            <div class="config-item">
                                <div class="config-label">Pages Scraped</div>
                                <div class="config-value">${job.progress?.pages_scraped || 0}</div>
                            </div>
                            <div class="config-item">
                                <div class="config-label">Amharic Pages</div>
                                <div class="config-value">${job.progress?.pages_amharic || 0}</div>
                            </div>
                            <div class="config-item">
                                <div class="config-label">Queue Size</div>
                                <div class="config-value">${job.progress?.queue_size || 0}</div>
                            </div>
                            <div class="config-item">
                                <div class="config-label">Elapsed Time</div>
                                <div class="config-value">${Math.round(job.stats?.elapsed_seconds || 0)}s</div>
                            </div>
                        </div>

                        ${job.progress?.current_url ? `
                            <h3 style="margin-top: 20px;">Current URL</h3>
                            <div class="url-list">
                                <div class="url-item">${job.progress.current_url}</div>
                            </div>
                        ` : ''}

                        ${job.error ? `
                            <div class="alert alert-error" style="margin-top: 20px;">
                                <strong>Error:</strong> ${job.error}
                            </div>
                        ` : ''}

                        <div style="margin-top: 20px;">
                            <small style="color: #999;">
                                Created: ${new Date(job.created_at).toLocaleString()}<br>
                                ${job.completed_at ? `Completed: ${new Date(job.completed_at).toLocaleString()}` : ''}
                            </small>
                        </div>
                    </div>
                `;
            } catch (error) {
                modalBody.innerHTML = `
                    <div class="alert alert-error">
                        Failed to load job details: ${error.message}
                    </div>
                `;
            }
        }

        // Close modal
        function closeModal() {
            document.getElementById('job-modal').classList.remove('active');
        }

        // Close modal on outside click
        document.getElementById('job-modal').addEventListener('click', (e) => {
            if (e.target.id === 'job-modal') {
                closeModal();
            }
        });

        // Auto-refresh running jobs every 5 seconds
        setInterval(() => {
            const runningJobs = document.querySelectorAll('.job-item.status-running');
            if (runningJobs.length > 0) {
                loadJobs();
            }
        }, 5000);

        // Load jobs on page load
        loadJobs();
    </script>
</body>
</html>
