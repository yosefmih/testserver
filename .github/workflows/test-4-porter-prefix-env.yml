# Test 4: PORTER_ prefixed shell env var — tests constructBuildEnv's auto-pickup
# Expected: PORTER_ENV_A already comes from server (set on app), but this overrides it
# Expected: constructBuildEnv picks up PORTER_ prefixed vars from shell and overwrites server value
"on":
    workflow_dispatch:
name: "Test 4: PORTER_ prefix shell env override"
jobs:
    porter-deploy:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
            - name: Set Github tag
              id: vars
              run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
            - name: Setup porter
              uses: porter-dev/setup-porter@v0.1.0
            - name: Deploy stack
              timeout-minutes: 30
              run: porter apply
              env:
                PORTER_APP_NAME: testserver
                PORTER_CLUSTER: "1"
                PORTER_DEPLOYMENT_TARGET_ID: 96882a89-3bac-419f-87cd-4d1e0f921f2b
                PORTER_HOST: https://yosefdev2.withporter.run
                PORTER_PROJECT: "1"
                PORTER_TAG: ${{ steps.vars.outputs.sha_short }}
                PORTER_TOKEN: ${{ secrets.PORTER_APP_1_869731671 }}
                PORTER_ENV_A: "i-was-overridden-from-gha-shell"
