"on":
    push:
        branches:
            - main
name: Deploy to testserver
jobs:
    porter-deploy:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
            - name: Set Github tag
              id: vars
              run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
            - name: Setup porter
              uses: porter-dev/setup-porter@v0.1.0
            - name: Deploy stack
              timeout-minutes: 30
              run: porter apply
              env:
                PORTER_APP_NAME: testserver
                PORTER_CLUSTER: "5776"
                PORTER_DEPLOYMENT_TARGET_ID: 9cce5cf7-9402-4249-91ee-b596483174ec
                PORTER_HOST: https://dashboard.porter.run
                PORTER_PROJECT: "18950"
                PORTER_TAG: ${{ steps.vars.outputs.sha_short }}
                PORTER_TOKEN: ${{ secrets.PORTER_APP_18950_16928 }}
