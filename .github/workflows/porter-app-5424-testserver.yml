"on":
    push:
        branches:
            - dev
name: Deploy to testserver
jobs:
    porter-deploy:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
            - name: Set Github tag
              id: vars
              run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
            - name: Setup porter
              uses: porter-dev/setup-porter@v0.1.0
            - name: Deploy stack
              timeout-minutes: 30
              run: porter apply
              env:
                PORTER_APP_NAME: testserver
                PORTER_CLUSTER: "5424"
                PORTER_DEPLOYMENT_TARGET_ID: e44c21be-9871-47a7-93fa-112b81736531
                PORTER_HOST: https://dashboard.porter.run
                PORTER_PROJECT: "18090"
                PORTER_TAG: ${{ steps.vars.outputs.sha_short }}
                PORTER_TOKEN: ${{ secrets.PORTER_APP_18090_869731671 }}
