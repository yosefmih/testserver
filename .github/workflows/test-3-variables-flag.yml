# Test 3: --variables flag — passes vars through server round-trip
# Expected: VARIABLES_FLAG_VAR = "i-was-passed-via-variables-flag" (goes to server, comes back)
# Expected: GHA_ONLY_VAR = NOT SET (in shell but no PORTER_ prefix, not in --variables)
"on":
    workflow_dispatch:
name: "Test 3: --variables flag"
jobs:
    porter-deploy:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
            - name: Set Github tag
              id: vars
              run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
            - name: Setup porter
              uses: porter-dev/setup-porter@v0.1.0
            - name: Deploy stack
              timeout-minutes: 30
              run: porter apply --variables VARIABLES_FLAG_VAR=i-was-passed-via-variables-flag
              env:
                PORTER_APP_NAME: testserver
                PORTER_CLUSTER: "1"
                PORTER_DEPLOYMENT_TARGET_ID: 96882a89-3bac-419f-87cd-4d1e0f921f2b
                PORTER_HOST: https://yosefdev2.withporter.run
                PORTER_PROJECT: "1"
                PORTER_TAG: ${{ steps.vars.outputs.sha_short }}
                PORTER_TOKEN: ${{ secrets.PORTER_APP_1_869731671 }}
                GHA_ONLY_VAR: "i-was-set-in-gha-env-block"
