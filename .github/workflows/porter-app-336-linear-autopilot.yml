"on":
    push:
        branches:
            - main
name: Deploy to linear-autopilot
jobs:
    porter-deploy:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
            - name: Set Github tag
              id: vars
              run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
            - name: Build with Narvi
              uses: yosefmih/narvi-action@v1
              with:
                server: ${{ vars.NARVI_SERVER }}
                token: ${{ secrets.NARVI_TOKEN }}
                context: linear-autopilot
                dockerfile: linear-autopilot/Dockerfile
                destination: 027047015519.dkr.ecr.us-east-2.amazonaws.com/linear-autopilot:${{ steps.vars.outputs.sha_short }}
            - name: Setup porter
              uses: porter-dev/setup-porter@v0.1.0
            - name: Deploy stack
              timeout-minutes: 30
              run: porter apply --no-build --tag ${{ steps.vars.outputs.sha_short }}
              env:
                PORTER_APP_NAME: linear-autopilot
                PORTER_CLUSTER: "336"
                PORTER_DEPLOYMENT_TARGET_ID: a9732059-8136-475a-a04b-089c03ee4ac7
                PORTER_HOST: https://dashboard.internal-tools.porter.run
                PORTER_PROJECT: "499"
                PORTER_TAG: ${{ steps.vars.outputs.sha_short }}
                PORTER_TOKEN: ${{ secrets.PORTER_APP_499_869731671 }}
