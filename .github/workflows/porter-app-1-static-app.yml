"on":
    push:
        branches:
            - main
name: Deploy to static-app
jobs:
    porter-deploy:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
            - name: Set Github tag
              id: vars
              run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
            - name: Setup porter
              # install.porter.run installs both `porter` and the
              # `docker-credential-porter` helper.
              uses: porter-dev/setup-porter@v0.1.0
            - name: Wire Porter cred helper for the static-app ECR
              # `porter docker configure` only writes credHelpers entries for
              # registries returned by client.ListRegistries(projectID); this
              # app's ECR isn't in that list. Patch the entry directly so the
              # docker daemon invokes docker-credential-porter for this
              # registry on pull/push.
              run: |
                mkdir -p ~/.docker
                [ -f ~/.docker/config.json ] || echo '{}' > ~/.docker/config.json
                tmp=$(mktemp)
                jq '.credHelpers["992382605253.dkr.ecr.us-east-1.amazonaws.com"] = "porter"' \
                  ~/.docker/config.json > "$tmp" && mv "$tmp" ~/.docker/config.json
                cat ~/.docker/config.json
            - name: Pre-pull :latest so the FROM stage finds it in the local cache
              # `porter apply`'s docker SDK BuildLocal call doesn't pass
              # AuthConfigs (cmd/docker/builder.go), so FROM lines pull
              # anonymously and fail on a private registry. Pulling here puts
              # :latest into the local image cache; the build's FROM finds it
              # locally and skips the network pull. PORTER_* env is what the
              # cred helper reads via viper (cmd/config/config.go).
              run: docker pull 992382605253.dkr.ecr.us-east-1.amazonaws.com/static-app:latest
              env:
                PORTER_HOST: https://yosefdev2.withporter.run
                PORTER_PROJECT: "1"
                PORTER_TOKEN: ${{ secrets.PORTER_APP_1_2 }}
            - name: Deploy stack
              timeout-minutes: 30
              run: porter apply
              env:
                PORTER_APP_NAME: static-app
                PORTER_CLUSTER: "1"
                PORTER_DEPLOYMENT_TARGET_ID: db804f74-b9dc-43fb-86d0-e120f3a03507
                PORTER_HOST: https://yosefdev2.withporter.run
                PORTER_PROJECT: "1"
                PORTER_TAG: ${{ steps.vars.outputs.sha_short }}
                PORTER_TOKEN: ${{ secrets.PORTER_APP_1_2 }}
                # Forwarded to docker build as ARG PORTER_BUILD_ID; build.sh
                # hashes asset chunks from this so every commit ships unique
                # asset hashes.
                PORTER_BUILD_ID: ${{ steps.vars.outputs.sha_short }}
            - name: Retag image as latest
              # The Dockerfile's FROM ...:latest AS previous stage needs
              # :latest to point at the most recently deployed image so the
              # next build carries forward its build_latest/ (N+N-1).
              run: |
                REPO=992382605253.dkr.ecr.us-east-1.amazonaws.com/static-app
                SHA=${{ steps.vars.outputs.sha_short }}
                docker tag  "$REPO:$SHA" "$REPO:latest"
                docker push "$REPO:latest"
              env:
                PORTER_HOST: https://yosefdev2.withporter.run
                PORTER_PROJECT: "1"
                PORTER_TOKEN: ${{ secrets.PORTER_APP_1_2 }}
