"on":
    push:
        branches:
            - main
name: Deploy to static-app
jobs:
    porter-deploy:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
            - name: Set Github tag
              id: vars
              run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
            - name: Setup porter
              uses: porter-dev/setup-porter@v0.1.0
            - name: Configure docker auth via Porter
              # install.porter.run installs both `porter` and
              # `docker-credential-porter`. `porter docker configure` writes
              # ~/.docker/config.json so the local docker daemon pulls/pushes
              # the project's registries via the Porter credential helper —
              # needed by the Dockerfile's FROM ...:latest AS previous stage.
              run: porter docker configure
              env:
                PORTER_HOST: https://yosefdev2.withporter.run
                PORTER_PROJECT: "1"
                PORTER_TOKEN: ${{ secrets.PORTER_APP_1_2 }}
            - name: Deploy stack
              timeout-minutes: 30
              run: porter apply
              env:
                PORTER_APP_NAME: static-app
                PORTER_CLUSTER: "1"
                PORTER_DEPLOYMENT_TARGET_ID: db804f74-b9dc-43fb-86d0-e120f3a03507
                PORTER_HOST: https://yosefdev2.withporter.run
                PORTER_PROJECT: "1"
                PORTER_TAG: ${{ steps.vars.outputs.sha_short }}
                PORTER_TOKEN: ${{ secrets.PORTER_APP_1_2 }}
                # Forwarded to docker build as ARG PORTER_BUILD_ID; static-app's
                # build.sh hashes asset chunks from this so every commit ships
                # unique asset hashes — required for the 404 reproduction.
                PORTER_BUILD_ID: ${{ steps.vars.outputs.sha_short }}
            - name: Retag image as latest
              # The Dockerfile's FROM ...:latest AS previous stage needs :latest
              # to point at the most recently deployed image so the next build
              # carries forward its build_latest/ (N+N-1 retention).
              run: |
                REPO=992382605253.dkr.ecr.us-east-1.amazonaws.com/static-app
                SHA=${{ steps.vars.outputs.sha_short }}
                docker pull "$REPO:$SHA"
                docker tag  "$REPO:$SHA" "$REPO:latest"
                docker push "$REPO:latest"
